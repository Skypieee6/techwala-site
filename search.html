<!DOCTYPE html>
<html class="dark" lang="en">
<body class="bg-background text-on-surface">
    <main class="pt-24 pb-16 max-w-4xl mx-auto px-4 md:px-6">
        <form id="search-form" class="relative mb-12" onsubmit="event.preventDefault(); submitSearch();">
            <input id="search-input" type="text" placeholder="Search for AI, reviews, gadgets..." class="w-full bg-surface border-2 border-outline-variant/50 rounded-2xl py-6 pl-8 pr-16 text-xl focus:border-primary focus:outline-none text-white">
            <button type="submit" class="absolute right-6 top-6 text-on-surface-variant hover:text-primary">
                <span class="material-symbols-outlined text-3xl">search</span>
            </button>
        </form>

        <h2 id="search-results-text" class="text-2xl font-headline font-bold mb-8 border-b border-outline-variant/30 pb-4">Enter a search term</h2>

        <div id="search-grid" class="flex flex-col gap-8"></div>
        
        <div id="ad-incontent" class="mt-12 w-full h-32 bg-surface/30 flex items-center justify-center rounded-xl relative"><span class="absolute top-2 left-2 text-[10px]">Partner Content</span></div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        
        if(query) {
            document.getElementById('search-input').value = query;
            performSearch(query);
        }

        function submitSearch() {
            const val = document.getElementById('search-input').value;
            window.location.href = `search.html?q=${encodeURIComponent(val)}`;
        }

        async function performSearch(q) {
            document.getElementById('search-results-text').textContent = `Searching for "${q}"...`;
            try {
                const res = await fetch('/content/articles/index.json');
                const articles = await res.json();
                
                const lowerQ = q.toLowerCase();
                const results = articles.filter(a => 
                    a.title.toLowerCase().includes(lowerQ) || 
                    a.metaDescription.toLowerCase().includes(lowerQ) ||
                    a.tags.some(t => t.toLowerCase().includes(lowerQ))
                );

                document.getElementById('search-results-text').textContent = `${results.length} results for "${q}"`;
                const container = document.getElementById('search-grid');
                container.innerHTML = '';

                results.forEach(article => {
                    container.innerHTML += `
                        <article class="flex flex-col md:flex-row gap-6 bg-surface/30 p-4 rounded-xl group border border-outline-variant/10">
                            <div class="md:w-1/3 aspect-[16/9] bg-surface rounded-lg overflow-hidden">
                                <img src="https://placehold.co/400x250/1e293b/6366f1?text=${encodeURIComponent(article.category)}" class="w-full h-full object-cover">
                            </div>
                            <div class="md:w-2/3 flex flex-col justify-center">
                                <a href="article.html?slug=${article.slug}">
                                    <span class="text-xs text-primary font-bold uppercase mb-2 block">${article.category}</span>
                                    <h3 class="text-2xl font-headline font-bold mb-2 group-hover:text-primary transition-colors">${article.title}</h3>
                                    <p class="text-on-surface-variant font-body">${article.metaDescription}</p>
                                </a>
                            </div>
                        </article>`;
                });
            } catch (e) {
                document.getElementById('search-results-text').textContent = "Error loading search results.";
            }
        }
    </script>
</body>
</html>
